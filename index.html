<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AceTalk | Simple Messenger</title>
    <link rel="icon" type="image/png" href="icon-192-new.png?v=3">
    <link rel="apple-touch-icon" href="icon-192-new.png?v=3">
    
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --skype-blue: #00aff0;
            --sidebar-bg: #2c3e50;
            --chat-bg: #ffffff;
            --call-green: #2ecc71;
            --call-red: #e74c3c;
            --msg-local: #f0faff;
            --msg-remote: #f9f9f9;
            --msg-local-border: #d1ecf1;
            --msg-remote-border: #eee;
            --chat-text: #333;
            /* YENİ: Mesaj giriş alanı glassmorphism için */
            --input-area-bg: rgba(255, 255, 255, 0.4);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.2);
            --input-color: #333;
            --sos-red: #e74c3c;
            --sos-dark: #c0392b;
        }

        /* YENİ: Varsayılan Arka Plan Ayarları (Wallpaper-Active Sınıfı Artık Body'de Hep Var) */
        body {
            height: 100%; margin: 0; font-family: 'Ubuntu', sans-serif; font-weight: 300; overflow: hidden;
            background-color: var(--sidebar-bg); /* Resim yüklenmezse diye fall-back */
            background-image: url('Acetalkwallpaper.jpg'); /* Varsayılan Arka Plan */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* YENİ: Panellerin Glassmorphism (Şeffaflık ve Blur) Efektleri */
        .sidebar,
        .main-chat,
        .right-bar {
            background: rgba(0, 0, 0, 0.3) !important; /* Şeffaflık */
            backdrop-filter: blur(20px); /* Blur efekti */
            border-color: rgba(255, 255, 255, 0.05) !important; /* Çok hafif kenarlık */
            color: #fff !important;
        }

        /* YENİ: İstediğin Gibi Çizgileri Kaldırmak */
        .sidebar { border-right: none !important; } /* Sol bar çizgisi kalktı */
        .right-bar { border-left: none !important; } /* Sağ bar çizgisi kalktı */
        .user-card, .online-title, .online-count, .theme-toggle, .lang-btn, .lang-switcher { border-color: rgba(255, 255, 255, 0.05) !important; }

        /* YENİ: Mesaj Giriş Alanına (İnput Area) Blur ve Şeffaflık Atmak */
        .input-area {
            padding: 20px 30px; display: flex; gap: 15px; align-items: center;
            background: var(--input-area-bg);
            border-top: 1px solid var(--input-border);
            backdrop-filter: blur(10px); /* Mesaj yazarken blur */
        }

        /* YENİ: Mesaj Giriş Alanındaki İnput Kutusu */
        #message-input {
            flex: 1; padding: 14px; outline: none; font-size: 14px; border-radius: 4px !important;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--input-color);
        }
        
        /* Tema Ayarları (Resim varken daha debloated) */
        body.dark-chat {
            --input-area-bg: rgba(0, 0, 0, 0.5); /* Koyu modda input blur */
            --input-border: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(0, 0, 0, 0.2);
            --input-color: #e0e0e0;
            --chat-text: #e0e0e0;
        }
        
        /* ... Senin Orijinal CSS Kodlarının Geri Kalanı ... */
        /* (Zamanlama, animasyonlar ve buton stilleri) */

        .theme-toggle { background: #1a252f; border: none; color: #7f8c8d; font-size: 11px; padding: 12px 12px; cursor: pointer; font-weight: bold; text-align: left; width: 100%; transition: all 0.2s ease; }
        .theme-toggle:hover { color: white; }
        .theme-toggle.active { color: white; border-left: 3px solid var(--skype-blue); padding-left: 9px; }
        * { box-sizing: border-box; border-radius: 0 !important; }
        button, .icon-btn, .theme-toggle { transition: color 0.2s ease, background 0.2s ease, transform 0.15s ease, box-shadow 0.15s ease; }
        /* [Senin animasyon ve buton kodların buraya devam ediyor...] */
        button:not(:disabled):active { transform: scale(0.95) translateY(1px); }
        button[onclick="connectToPeer()"] { position: relative; overflow: hidden; }
        button[onclick="connectToPeer()"]:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,175,240,0.4); }
        button[onclick="connectToPeer()"]:not(:disabled):active { transform: translateY(0px); box-shadow: none; }
        button[onclick="startCall()"] { position: relative; overflow: hidden; }
        button[onclick="startCall()"]:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(46,204,113,0.4); }
        button[onclick="startCall()"]:not(:disabled):active { transform: scale(0.95); }
        @keyframes callPulse { 0%   { box-shadow: 0 0 0 0 rgba(46,204,113,0.5); } 70%  { box-shadow: 0 0 0 8px rgba(46,204,113,0); } 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); } }
        @keyframes connectPulse { 0%   { box-shadow: 0 0 0 0 rgba(0,175,240,0.5); } 70%  { box-shadow: 0 0 0 8px rgba(0,175,240,0); } 100% { box-shadow: 0 0 0 0 rgba(0,175,240,0); } }
        button[onclick="startCall()"]:not(:disabled):hover { animation: callPulse 1.2s infinite; }
        button[onclick="connectToPeer()"]:not(:disabled):hover { animation: connectPulse 1.2s infinite; }
        .icon-btn[onclick="sendMessage()"] { transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), color 0.2s ease !important; }
        .icon-btn[onclick="sendMessage()"]:hover { transform: translateX(4px) scale(1.15); }
        .icon-btn[onclick="sendMessage()"]:active { transform: translateX(8px) scale(0.95); }
        label.icon-btn { transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), color 0.2s ease !important; }
        label.icon-btn:hover { transform: scale(1.2) rotate(-5deg); }
        label.icon-btn:active { transform: scale(0.9); }
        .lang-btn { transition: color 0.2s ease, border-color 0.2s ease, transform 0.15s ease !important; }
        .lang-btn:hover { transform: translateY(-2px); color: #ccc; }
        .lang-btn:active { transform: translateY(0); }
        .theme-toggle:hover { transform: translateX(3px); }
        .theme-toggle:active { transform: translateX(0); }
        @keyframes sosShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-3px) rotate(-1deg); } 40% { transform: translateX(3px) rotate(1deg); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
        .sos-btn:not(:disabled):hover { animation: sosShake 0.4s ease; box-shadow: 0 0 12px rgba(231,76,60,0.6); }
        .sos-btn:not(:disabled):active { transform: scale(0.93); box-shadow: none; }
        #call-overlay button:hover { transform: scale(1.05); filter: brightness(1.15); }
        #call-overlay button:active { transform: scale(0.96); }
        html { height: 100%; margin: 0; font-family: 'Ubuntu', sans-serif; font-weight: 300; overflow: hidden; }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sidebar-bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .loaded #splash-screen { transform: translateY(-100%); }
        .splash-loader { width: 50px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 20px; position: relative; overflow: hidden; }
        .splash-loader::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--skype-blue); animation: loading 1.5s infinite; }
        @keyframes loading { 100% { left: 100%; } }

        .app-container { display: flex; height: 100vh; width: 100vw; opacity: 0; }
        .loaded .app-container { opacity: 1; }

        .sidebar { width: 280px; display: flex; flex-direction: column; padding: 25px; z-index: 10; }
        .brand-section { margin-bottom: 30px; }
        .brand-name { color: var(--skype-blue); font-size: 32px; font-weight: 700; margin: 0; }
        .sidebar-slogan { font-size: 10px; color: #ccc; text-transform: uppercase; letter-spacing: 2px; }

        .my-status-box { background: rgba(0,0,0,0.2); padding: 15px; margin-bottom: 10px; border-left: 3px solid var(--skype-blue); }
        .status-input { width: 100%; background: transparent; border: none; color: white; font-weight: bold; font-size: 14px; outline: none; border-bottom: 1px solid #34495e; padding-bottom: 5px; }

        .lang-switcher { display: flex; flex-direction: row; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
        .lang-btn { background: #1a252f; border: none; color: #7f8c8d; font-size: 11px; padding: 8px 10px; cursor: pointer; font-weight: bold; letter-spacing: 1px; flex: 1; text-align: center; transition: none; }
        .lang-btn.active { color: white; border-bottom: 2px solid var(--skype-blue); }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; }
        #chat-box { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { max-width: 70%; padding: 12px 18px; line-height: 1.6; position: relative; font-size: 14px; animation: msgIn 0.3s ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .local { background: var(--msg-local); align-self: flex-end; border: 1px solid var(--msg-local-border); border-right: 4px solid var(--skype-blue); color: var(--chat-text); }
        .remote { background: var(--msg-remote); align-self: flex-start; border: 1px solid var(--msg-remote-border); border-left: 4px solid #bdc3c7; color: var(--chat-text); }
        .msg-meta { font-size: 9px; margin-top: 5px; color: #999; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .seen-icon { color: var(--skype-blue); font-weight: bold; }

        .msg-sos {
            max-width: 90%;
            align-self: center;
            background: #2d0000;
            border: 2px solid var(--sos-red);
            border-left: 6px solid var(--sos-red);
            color: #ff6b6b;
            padding: 14px 20px;
            font-size: 14px;
            animation: sosPulse 0.5s ease-out, msgIn 0.3s ease-out;
            position: relative;
        }
        @keyframes sosPulse {
            0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.7); }
            70% { box-shadow: 0 0 0 12px rgba(231,76,60,0); }
            100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
        }
        .sos-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--sos-red);
            margin-bottom: 5px;
        }
        .sos-from {
            font-size: 11px;
            color: #ff9999;
            margin-top: 6px;
        }
        .sos-hop {
            font-size: 9px;
            color: #ccc;
            margin-top: 3px;
        }

        .sos-btn {
            background: var(--sos-red);
            color: white;
            border: none;
            padding: 6px 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Ubuntu', sans-serif;
            letter-spacing: 1px;
            font-size: 11px;
            position: relative;
            overflow: hidden;
            transition: background 0.2s ease !important;
            width: auto;
            align-self: flex-start;
        }
        .sos-btn:hover { background: var(--sos-dark); }
        .sos-btn:disabled {
            background: #555;
            cursor: not-allowed;
            color: #999;
            letter-spacing: 0px;
        }
        .sos-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.15);
            transition: left 0.3s ease;
        }
        .sos-btn:not(:disabled):hover::after { left: 100%; }
        
        .icon-btn { cursor: pointer; display: flex; align-items: center; transition: 0.2s; user-select: none; color: var(--skype-blue); }
        .icon-btn:hover { transform: none !important; }

        .mountain-icon { width: 24px; height: 24px; position: relative; overflow: hidden; border: 2px solid currentColor; border-radius: 4px !important; }
        .mountain-icon::before { content: ''; position: absolute; bottom: -2px; left: 1px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 12px solid currentColor; }
        .mountain-icon::after { content: ''; position: absolute; bottom: -2px; left: 8px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 9px solid currentColor; }
        .sun { position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; background: currentColor; border-radius: 50% !important; }

        .right-bar { width: 240px; padding: 25px 20px; }
        .online-title { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 1px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .online-count { background: var(--skype-blue); color: white; padding: 2px 8px; font-size: 10px; }
        .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
        .user-avatar { width: 35px; height: 35px; background: #ddd; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 12px; }

        #call-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        body.dark-chat .right-bar .online-title { color: #fff; }
        body.dark-chat .user-name { color: #e0e0e0; }

        #sos-timer {
            font-size: 9px;
            color: #e74c3c;
            text-align: center;
            margin-top: 4px;
            min-height: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<audio id="snd-msg" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-call" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
<audio id="snd-sos" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div id="call-overlay">
    <div style="font-size: 60px; margin-bottom: 20px;">📞</div>
    <h2 id="call-name">AceTalk Voice</h2>
    <p id="call-status" data-i18n="calling">ARANIYOR...</p>
    <button onclick="endCall()" data-i18n="closeCall" style="background: var(--call-red); color: white; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; margin-top: 30px;">KAPAT</button>
</div>

<div id="splash-screen">
    <h1 style="color: var(--skype-blue); font-weight: 700; font-size: 48px; margin: 0;">AceTalk</h1>
    <div class="sidebar-slogan" style="color: white; margin-top: 5px;">Simple Messenger</div>
    <div class="splash-loader"></div>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="brand-section" style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 30px;">
            <div>
                <h1 class="brand-name">AceTalk</h1>
                <div class="sidebar-slogan">Simple Messenger</div>
            </div>
        </div>

        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLanguage('tr')">TR</button>
            <button class="lang-btn" onclick="setLanguage('en')">EN</button>
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Koyu Mod</button>
            </div>

        <div class="my-status-box">
            <b style="font-size: 10px; color: var(--skype-blue);" data-i18n="myName">ADIM</b>
            <input type="text" id="my-name-input" class="status-input" value="AceUser" onchange="updateMyProfile()">
            <small style="display:block; margin-top:15px; font-size: 9px; color: #7f8c8d;">ID: <span id="my-id" style="color: #00ffcc; cursor:pointer;" onclick="navigator.clipboard.writeText(this.innerText).then(()=>{this.style.color='#fff';setTimeout(()=>this.style.color='#00ffcc',1000)})" title="Kopyalamak için tıkla">...</span></small>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="peer-id-input" data-i18n-placeholder="idPlaceholder" placeholder="Bağlanılacak ID..." style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 10px; color: white; outline: none;">
            <button onclick="connectToPeer()" data-i18n="connectBtn" style="background: var(--skype-blue); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer;">BAĞLAN</button>
            <button onclick="startCall()" data-i18n="voiceCall" style="background: var(--call-green); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer;">SESLİ ARA</button>
            
            <div style="display:flex; align-items:center; gap:8px;">
                <button class="sos-btn" id="sos-btn" onclick="sendSOS()">🚨 ACİL</button>
                <div id="sos-timer" style="font-size:9px; color:#e74c3c; letter-spacing:1px;"></div>
            </div>
        </div>
    </div>

    <div class="main-chat" id="drop-zone">
        <div id="chat-box">
            <div id="welcome-msg" style="margin: auto; text-align: center; color: #ccc;">
                <p data-i18n="secureChat">Güvenli ve şifreli uçtan uca sohbet.</p>
                <small data-i18n="enterId">Bağlanmak için bir ID girin.</small>
            </div>
        </div>
        
        <div class="typing-pulse" id="typing-ui" style="display:none; color: #00aff0; font-weight: bold; font-size: 11px; padding: 4px 30px;">birileri yazıyor...</div>

        <div class="input-area">
            <label for="img-input" class="icon-btn" title="Resim Gönder">
                <div class="mountain-icon">
                    <div class="sun"></div>
                </div>
            </label>
            <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImage(this)">
            
            <input type="text" id="message-input" data-i18n-placeholder="msgPlaceholder" placeholder="Mesajınızı yazın...">
            
            <div class="icon-btn" onclick="sendMessage()" title="Gönder" style="font-size: 26px; color: var(--skype-blue);">➤</div>
        </div>
    </div>

    <div class="right-bar">
        <div class="online-title"><span data-i18n="online">ÇEVRİMİÇİ</span> <span class="online-count" id="conn-count">0</span></div>
        <div id="online-list"></div>
    </div>
</div>

<audio id="remote-audio" autoplay></audio>

<script>
    // Duvar kağıdı fonksiyonu kaldırıldı, varsayılan açılış yapıldı.

    // Senin mevcut JavaScript kodların...
    const i18n = { tr: { myName: "ADIM", idPlaceholder: "Bağlanılacak ID...", connectBtn: "BAĞLAN", voiceCall: "SESLİ ARA", secureChat: "Güvenli ve şifreli uçtan uca sohbet.", enterId: "Bağlanmak için bir ID girin.", msgPlaceholder: "Mesajınızı yazın...", online: "ÇEVRİMİÇİ", calling: "ARANIYOR...", closeCall: "KAPAT", typing: "yazıyor...", callAlert: "Arama geliyor!", sosBtn: "🚨 ACİL YARDIM", sosCooldown: "saniye bekle", sosReceived: "ACİL YARDIM ÇAĞRISI", sosFrom: "Gönderen", sosHops: "ağ üzerinden ulaştı", sosNoConn: "Bağlı kimse yok! Önce birine bağlan." }, en: { myName: "MY NAME", idPlaceholder: "ID to connect...", connectBtn: "CONNECT", voiceCall: "VOICE CALL", secureChat: "Secure and end-to-end encrypted chat.", enterId: "Enter an ID to connect.", msgPlaceholder: "Type your message...", online: "ONLINE", calling: "CALLING...", closeCall: "HANG UP", typing: "is typing...", callAlert: "Incoming call!", sosBtn: "🚨 EMERGENCY SOS", sosCooldown: "seconds wait", sosReceived: "EMERGENCY SOS RECEIVED", sosFrom: "From", sosHops: "hops away", sosNoConn: "Nobody connected! Connect to someone first." } };
    
    // [Geri kalan JS fonksiyonların buraya devam ediyor...]
    let currentLang = 'tr';
    let isLightMode = false;
    function toggleTheme() { isLightMode = !isLightMode; document.body.classList.toggle('dark-chat', isLightMode); const btn = document.getElementById('theme-btn'); if (isLightMode) { btn.innerText = '☀️ Açık Mod'; btn.classList.add('active'); } else { btn.innerText = '🌙 Koyu Mod'; btn.classList.remove('active'); } }
    function setLanguage(lang) { currentLang = lang; document.querySelectorAll('.lang-btn').forEach(btn => { const onclickAttr = btn.getAttribute('onclick'); if(onclickAttr) { const match = onclickAttr.match(/'(\w+)'/); if(match) btn.classList.toggle('active', match[1] === lang); } }); document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if(i18n[lang][key]) el.innerText = i18n[lang][key]; }); document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const key = el.getAttribute('data-i18n-placeholder'); el.placeholder = i18n[lang][key]; }); }
    window.addEventListener('load', () => setTimeout(() => document.body.classList.add('loaded'), 2500));
    const peer = new Peer(); let connections = []; let peerNames = {}; let currentCall = null; let typingTimeout = null;
    peer.on('open', id => document.getElementById('my-id').innerText = id); peer.on('connection', conn => setupConn(conn));
    function connectToPeer() { const pid = document.getElementById('peer-id-input').value; if(!pid || connections.find(c => c.peer === pid)) return; setupConn(peer.connect(pid)); }
    function setupConn(conn) { conn.on('open', () => { if(!connections.find(c => c.peer === conn.peer)) { connections.push(conn); const myName = document.getElementById('my-name-input').value; conn.send({type: 'profile', name: myName}); updateUI(); } }); conn.on('data', data => { if(data.type === 'profile') { peerNames[conn.peer] = data.name; updateUI(); } else if(data.type === 'msg') { playAudio('snd-msg'); addMessage(data.name, parseMarkdown(data.body), 'remote', data.time); conn.send({type: 'seen', msgId: data.time}); } else if(data.type === 'seen') { markAsSeen(data.msgId); } else if(data.type === 'typing') { showTyping(data.name, data.state); } else if(data.type === 'sos') { handleSOS(data); } }); conn.on('close', () => { connections = connections.filter(c => c.peer !== conn.peer); delete peerNames[conn.peer]; updateUI(); }); }
    const seenSOS = new Set(); let sosCooldownTimer = null; const SOS_COOLDOWN = 60;
    function sendSOS() { if(connections.length === 0) { alert(i18n[currentLang].sosNoConn); return; } const myName = document.getElementById('my-name-input').value; const myId  = document.getElementById('my-id').innerText; const sosId  = myId + '_' + Date.now(); const sosPacket = { type: 'sos', id: sosId, fromId: myId, fromName: myName, ttl: 5, hopCount: 0, timestamp: Date.now() }; seenSOS.add(sosId); addSOSMessage(myName, 0, true); connections.forEach(c => c.send(sosPacket)); startSOSCooldown(); }
    function handleSOS(data) { if(seenSOS.has(data.id)) return; if(data.ttl <= 0) return; seenSOS.add(data.id); playAudio('snd-sos'); addSOSMessage(data.fromName, data.hopCount + 1, false); const forwardPacket = { ...data, ttl: data.ttl - 1, hopCount: data.hopCount + 1 }; connections.forEach(c => c.send(forwardPacket)); }
    function addSOSMessage(fromName, hops, isSelf) { const box = document.getElementById('chat-box'); const lang = i18n[currentLang]; const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); const hopText = hops > 0 ? `<div class="sos-hop">↳ ${hops} ${lang.sosHops}</div>` : ''; box.innerHTML += `<div class="msg msg-sos"><div class="sos-label">⚠ ${lang.sosReceived}</div><b style="font-size:15px;">${isSelf ? '🆘 ' + fromName : '🚨 ' + fromName}</b><div class="sos-from">${lang.sosFrom}: ${fromName}</div>${hopText}<div class="msg-meta" style="color:#ccc;">${time}</div></div>`; box.scrollTop = box.scrollHeight; document.title = `🚨 SOS – ${fromName} | AceTalk`; setTimeout(() => document.title = 'AceTalk | Simple Messenger', 8000); }
    function startSOSCooldown() { const btn = document.getElementById('sos-btn'); const timerEl = document.getElementById('sos-timer'); btn.disabled = true; let remaining = SOS_COOLDOWN; timerEl.innerText = `${remaining} ${i18n[currentLang].sosCooldown}`; sosCooldownTimer = setInterval(() => { remaining--; if(remaining <= 0) { clearInterval(sosCooldownTimer); btn.disabled = false; timerEl.innerText = ''; btn.innerText = i18n[currentLang].sosBtn; } else { timerEl.innerText = `${remaining} ${i18n[currentLang].sosCooldown}`; } }, 1000); }
    function parseMarkdown(text) { return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/~~(.*?)~~/g, '<s>$1</s>').replace(/`(.*?)`/g, '<code>$1</code>'); }
    function updateMyProfile() { const myName = document.getElementById('my-name-input').value; connections.forEach(c => c.send({type: 'profile', name: myName})); }
    function sendMessage() { const input = document.getElementById('message-input'); const myName = document.getElementById('my-name-input').value; const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); if(input.value.trim() === "") return; connections.forEach(c => c.send({type: 'msg', name: myName, body: input.value, time: time})); addMessage("", parseMarkdown(input.value), 'local', time); input.value = ""; notifyTyping(false); }
    function addMessage(user, text, type, time) { const box = document.getElementById('chat-box'); const displayTime = time.substring(0, 5); const id = time.replace(/:/g, ''); box.innerHTML += `<div class="msg ${type}">${user ? `<strong>${user}</strong><br>` : ''}${text}<div class="msg-meta">${displayTime}${type === 'local' ? `<span id="seen-${id}" style="margin-left:4px;">✔</span>` : ''}</div></div>`; box.scrollTop = box.scrollHeight; }
    function markAsSeen(time) { const id = time.replace(/:/g, ''); const el = document.getElementById(`seen-${id}`); if(el) { el.innerHTML = '✔✔'; el.classList.add('seen-icon'); } }
    function handleImage(input) { if(input.files[0]) { const reader = new FileReader(); reader.onload = e => { const imgHtml = `<img src="${e.target.result}" style="max-width:100%; border-radius:2px; margin-top:5px; display:block;">`; sendSpecialMessage(imgHtml); }; reader.readAsDataURL(input.files[0]); } }
    function sendSpecialMessage(content) { const myName = document.getElementById('my-name-input').value; const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); connections.forEach(c => c.send({type: 'msg', name: myName, body: content, time: time})); addMessage("", content, 'local', time); }
    function notifyTyping(state = true) { const myName = document.getElementById('my-name-input').value; connections.forEach(c => c.send({type: 'typing', name: myName, state: state})); if(state) { clearTimeout(typingTimeout); typingTimeout = setTimeout(() => notifyTyping(false), 3000); } }
    function showTyping(name, state) { const ui = document.getElementById('typing-ui'); if(state) { ui.innerText = `${name} ${i18n[currentLang].typing}`; ui.style.display = 'block'; } else { ui.style.display = 'none'; } }
    function stringToColor(str) { let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash); let color = '#'; for (let i = 0; i < 3; i++) { let value = (hash >> (i * 8)) & 0xFF; color += ('00' + value.toString(16)).substr(-2); } return color; }
    function updateUI() { document.getElementById('conn-count').innerText = connections.length; const list = document.getElementById('online-list'); list.innerHTML = ""; connections.forEach(c => { const displayName = peerNames[c.peer] || "Bağlanıyor..."; list.innerHTML += `<div class="user-card" style="flex-direction:column; align-items:flex-start; gap:2px;"><div style="display:flex; align-items:center; gap:10px;"><div class="user-avatar" style="background:${stringToColor(c.peer)}">${displayName.charAt(0).toUpperCase()}</div><div class="user-name">${displayName}</div></div><div class="user-status" style="font-size:9px; color:#ccc;">ID: ${c.peer.substring(0,8)}...</div></div>`; }); }
    function playAudio(id) { document.getElementById(id).play().catch(()=>{}); }
    function endCall() { if(currentCall) { currentCall.close(); currentCall = null; document.getElementById('call-overlay').style.display = 'none'; } }
    function startCall() { alert("Sesli arama özelliği üzerinde çalışılıyor."); }
</script>
