<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AceTalk | Simple Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --skype-blue: #00aff0;
            --sidebar-bg: #2c3e50;
            --chat-bg: #ffffff;
            --call-green: #2ecc71;
            --call-red: #e74c3c;
            --msg-local: #f0faff;
            --msg-remote: #f9f9f9;
        }

        * { box-sizing: border-box; border-radius: 0 !important; transition: all 0.2s ease; }
        body, html { height: 100%; margin: 0; font-family: 'Ubuntu', sans-serif; font-weight: 300; overflow: hidden; background-color: var(--sidebar-bg); }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sidebar-bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .loaded #splash-screen { transform: translateY(-100%); }
        .splash-loader { width: 50px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 20px; position: relative; overflow: hidden; }
        .splash-loader::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--skype-blue); animation: loading 1.5s infinite; }
        @keyframes loading { 100% { left: 100%; } }

        /* --- ANA KONTEYNER --- */
        .app-container { display: flex; height: 100vh; width: 100vw; opacity: 0; }
        .loaded .app-container { opacity: 1; }

        /* --- SOL PANEL --- */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 25px; border-right: 1px solid #1a252f; z-index: 10; }
        .brand-section { margin-bottom: 30px; }
        .brand-name { color: var(--skype-blue); font-size: 32px; font-weight: 700; margin: 0; }
        .sidebar-slogan { font-size: 10px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 2px; }

        .my-status-box { background: rgba(0,0,0,0.2); padding: 15px; margin-bottom: 20px; border-left: 3px solid var(--skype-blue); }
        .status-input { width: 100%; background: transparent; border: none; color: white; font-weight: bold; font-size: 14px; outline: none; border-bottom: 1px solid #34495e; padding-bottom: 5px; }

        /* --- SOHBET ALANI --- */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; }
        #chat-box { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { max-width: 70%; padding: 12px 18px; line-height: 1.6; position: relative; font-size: 14px; animation: msgIn 0.3s ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .local { background: var(--msg-local); align-self: flex-end; border: 1px solid #d1ecf1; border-right: 4px solid var(--skype-blue); }
        .remote { background: var(--msg-remote); align-self: flex-start; border: 1px solid #eee; border-left: 4px solid #bdc3c7; }
        .msg-meta { font-size: 9px; margin-top: 5px; color: #999; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .seen-icon { color: var(--skype-blue); font-weight: bold; }

        /* --- GİRİŞ ALANI --- */
        .input-area { padding: 20px 30px; display: flex; gap: 15px; border-top: 1px solid #eee; background: #fff; align-items: center; }
        #message-input { flex: 1; padding: 14px; border: 1px solid #ddd; outline: none; font-size: 14px; background: #fdfdfd; border-radius: 4px !important; }
        
        .icon-btn { cursor: pointer; display: flex; align-items: center; transition: 0.2s; user-select: none; color: var(--skype-blue); }
        .icon-btn:hover { transform: none !important; }

        .mountain-icon { width: 24px; height: 24px; position: relative; overflow: hidden; border: 2px solid currentColor; border-radius: 4px !important; }
        .mountain-icon::before { content: ''; position: absolute; bottom: -2px; left: 1px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 12px solid currentColor; }
        .mountain-icon::after { content: ''; position: absolute; bottom: -2px; left: 8px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 9px solid currentColor; }
        .sun { position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; background: currentColor; border-radius: 50% !important; }

        /* --- SAĞ PANEL --- */
        .right-bar { width: 240px; background: #fcfcfc; border-left: 1px solid #eee; padding: 25px 20px; }
        .online-title { font-size: 12px; font-weight: 700; color: #95a5a6; letter-spacing: 1px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .online-count { background: var(--skype-blue); color: white; padding: 2px 8px; font-size: 10px; }
        .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .user-avatar { width: 35px; height: 35px; background: #ddd; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 12px; }

        /* --- CALL OVERLAY --- */
        #call-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .typing-pulse { font-size: 11px; color: var(--skype-blue); margin-bottom: 10px; margin-left: 30px; display: none; }
    </style>
</head>
<body>

<audio id="snd-msg" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-call" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

<div id="call-overlay">
    <div style="font-size: 60px; margin-bottom: 20px;">📞</div>
    <h2 id="call-name">AceTalk Voice</h2>
    <p id="call-status">ARANIYOR...</p>
    <button onclick="endCall()" style="background: var(--call-red); color: white; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; margin-top: 30px;">KAPAT</button>
</div>

<div id="splash-screen">
    <h1 style="color: var(--skype-blue); font-weight: 700; font-size: 48px; margin: 0;">AceTalk</h1>
    <div class="sidebar-slogan" style="color: white; margin-top: 5px;">Simple Messenger</div>
    <div class="splash-loader"></div>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="brand-section">
            <h1 class="brand-name">AceTalk</h1>
            <div class="sidebar-slogan">Simple Messenger</div>
        </div>

        <div class="my-status-box">
            <b style="font-size: 10px; color: var(--skype-blue);">ADIM</b>
            <input type="text" id="my-name-input" class="status-input" value="AceUser" onchange="updateMyProfile()">
            <small style="display:block; margin-top:15px; font-size: 9px; color: #7f8c8d;">ID: <span id="my-id" style="color: #00ffcc;">...</span></small>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="peer-id-input" placeholder="Bağlanılacak ID..." style="background: #1a252f; border: 1px solid #34495e; padding: 10px; color: white; outline: none;">
            <button onclick="connectToPeer()" style="background: var(--skype-blue); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer;">BAĞLAN</button>
            <button onclick="startCall()" style="background: var(--call-green); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer;">SESLİ ARA</button>
        </div>
    </div>

    <div class="main-chat" id="drop-zone">
        <div id="chat-box">
            <div style="margin: auto; text-align: center; color: #ccc;">
                <p>Güvenli ve şifreli uçtan uca sohbet.</p>
                <small>Bağlanmak için bir ID girin.</small>
            </div>
        </div>
        
        <div class="typing-pulse" id="typing-ui">birileri yazıyor...</div>

        <div class="input-area">
            <label for="img-input" class="icon-btn" title="Resim Gönder">
                <div class="mountain-icon">
                    <div class="sun"></div>
                </div>
            </label>
            <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImage(this)">
            
            <input type="text" id="message-input" placeholder="Mesajınızı yazın..." 
                   onkeypress="if(event.key==='Enter') sendMessage()"
                   oninput="notifyTyping()">
            
            <div class="icon-btn" onclick="sendMessage()" title="Gönder" style="font-size: 26px; color: var(--skype-blue);">➤</div>
        </div>
    </div>

    <div class="right-bar">
        <div class="online-title">ÇEVRİMİÇİ <span class="online-count" id="conn-count">0</span></div>
        <div id="online-list"></div>
    </div>
</div>

<audio id="remote-audio" autoplay></audio>

<script>
    window.addEventListener('load', () => setTimeout(() => document.body.classList.add('loaded'), 2500));

    const peer = new Peer();
    let connections = [];
    let peerNames = {}; 
    let currentCall = null;
    let typingTimeout = null;

    peer.on('open', id => document.getElementById('my-id').innerText = id);
    peer.on('connection', conn => setupConn(conn));

    function connectToPeer() {
        const pid = document.getElementById('peer-id-input').value;
        if(!pid || connections.find(c => c.peer === pid)) return;
        setupConn(peer.connect(pid));
    }

    function setupConn(conn) {
        conn.on('open', () => {
            if(!connections.find(c => c.peer === conn.peer)) {
                connections.push(conn);
                const myName = document.getElementById('my-name-input').value;
                conn.send({type: 'profile', name: myName});
                updateUI();
            }
        });
        conn.on('data', data => {
            if(data.type === 'profile') { peerNames[conn.peer] = data.name; updateUI(); }
            else if(data.type === 'msg') { 
                playAudio('snd-msg'); 
                addMessage(data.name, parseMarkdown(data.body), 'remote', data.time);
                conn.send({type: 'seen', msgId: data.time}); // Görüldü onayı gönder
            }
            else if(data.type === 'seen') { markAsSeen(data.msgId); }
            else if(data.type === 'typing') { showTyping(data.name, data.state); }
        });
        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            delete peerNames[conn.peer];
            updateUI();
        });
    }

    // --- MARKDOWN DİLLERİ ---
    function parseMarkdown(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')   // Kalın
            .replace(/\*(.*?)\*/g, '<i>$1</i>')       // İtalik
            .replace(/~~(.*?)~~/g, '<s>$1</s>')       // Üstü Çizili
            .replace(/`(.*?)`/g, '<code>$1</code>');  // Kod
    }

    function updateMyProfile() {
        const myName = document.getElementById('my-name-input').value;
        connections.forEach(c => c.send({type: 'profile', name: myName}));
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const myName = document.getElementById('my-name-input').value;
        // Benzersiz ID için saniyeyi de ekledik
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        if(input.value.trim() === "") return;
        
        connections.forEach(c => c.send({type: 'msg', name: myName, body: input.value, time: time}));
        addMessage("", parseMarkdown(input.value), 'local', time);
        input.value = "";
        notifyTyping(false);
    }

    function addMessage(user, text, type, time) {
        const box = document.getElementById('chat-box');
        const displayTime = time.substring(0, 5); // Ekranda saniyesiz göster
        const id = time.replace(/:/g, ''); // HTML ID için temizle
        
        box.innerHTML += `
            <div class="msg ${type}">
                ${user ? `<strong>${user}</strong><br>` : ''}
                ${text}
                <div class="msg-meta">
                    ${displayTime} 
                    ${type === 'local' ? `<span id="seen-${id}" style="margin-left:4px;">✔</span>` : ''}
                </div>
            </div>`;
        box.scrollTop = box.scrollHeight;
    }

    // --- GÖRÜLDÜ İŞLEME ---
    function markAsSeen(time) {
        const id = time.replace(/:/g, '');
        const el = document.getElementById(`seen-${id}`);
        if(el) {
            el.innerHTML = '✔✔';
            el.classList.add('seen-icon');
        }
    }

    function handleImage(input) {
        if(input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const imgHtml = `<img src="${e.target.result}" style="max-width:100%; border-radius:2px; margin-top:5px; display:block;">`;
                sendSpecialMessage(imgHtml);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function sendSpecialMessage(content) {
        const myName = document.getElementById('my-name-input').value;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        connections.forEach(c => c.send({type: 'msg', name: myName, body: content, time: time}));
        addMessage("", content, 'local', time);
    }

    function notifyTyping(state = true) {
        const myName = document.getElementById('my-name-input').value;
        connections.forEach(c => c.send({type: 'typing', name: myName, state: state}));
        if(state) {
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => notifyTyping(false), 3000);
        }
    }

    function showTyping(name, state) {
        const ui = document.getElementById('typing-ui');
        ui.innerText = `${name} yazıyor...`;
        ui.style.display = state ? 'block' : 'none';
    }

    function updateUI() {
        document.getElementById('conn-count').innerText = connections.length;
        const list = document.getElementById('online-list');
        list.innerHTML = "";
        connections.forEach(c => {
            const displayName = peerNames[c.peer] || "Bağlanıyor...";
            list.innerHTML += `
                <div class="user-card">
                    <div class="user-avatar" style="background:${stringToColor(c.peer)}">${displayName.charAt(0).toUpperCase()}</div>
                    <div class="user-name">${displayName}</div>
                </div>`;
        });
    }

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return `hsl(${hash % 360}, 60%, 50%)`;
    }

    function playAudio(id) { const a = document.getElementById(id); a.currentTime = 0; a.play().catch(()=>{}); }

    peer.on('call', call => { if(confirm("Arama geliyor!")) { navigator.mediaDevices.getUserMedia({audio:true}).then(s => { call.answer(s); startCallUI(call, s); }); } });
    function startCall() { 
        const pid = document.getElementById('peer-id-input').value;
        if(pid) navigator.mediaDevices.getUserMedia({audio:true}).then(s => startCallUI(peer.call(pid, s), s));
    }
    function startCallUI(call, s) { 
        currentCall = call; playAudio('snd-call'); document.getElementById('call-overlay').style.display='flex';
        call.on('stream', rs => { document.getElementById('snd-call').pause(); document.getElementById('remote-audio').srcObject = rs; });
    }
    function endCall() { if(currentCall) currentCall.close(); location.reload(); }
</script>
</body>
</html>
