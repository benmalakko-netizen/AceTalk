<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AceTalk | Simple Messenger</title>
    <link rel="icon" type="image/png" href="icon-192-new.png?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --skype-blue: #00aff0;
            --glass-bg: rgba(255, 255, 255, 0.08); /* Tek tip şeffaf arka plan */
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #fff;
        }

        body {
            height: 100vh; margin: 0; font-family: 'Ubuntu', sans-serif; overflow: hidden;
            background-image: url('Acetalkwallpaper.jpg'); background-size: cover; background-position: center;
        }

        /* Tek tip Blur yapısı */
        .sidebar, .main-chat, .right-bar, .input-area {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border) !important;
            color: var(--text-color);
        }

        /* Çizgileri tamamen kaldırma */
        .sidebar, .main-chat, .right-bar { border: none !important; }

        .app-container { display: flex; height: 100vh; width: 100vw; gap: 1px; } /* Boşlukları kapattık */

        .sidebar { width: 280px; padding: 25px; display: flex; flex-direction: column; }
        
        /* 4 Dil Desteği */
        .lang-switcher { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 20px; }
        .lang-btn { background: rgba(0,0,0,0.2); border: none; color: #ccc; padding: 8px; cursor: pointer; font-size: 10px; }
        .lang-btn.active { background: var(--skype-blue); color: white; }

        .main-chat { flex: 1; display: flex; flex-direction: column; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; }

        /* Mesaj Giriş Alanı - Blur'a Dahil */
        .input-area { padding: 15px; display: flex; gap: 10px; align-items: center; border-radius: 0 !important; }
        #message-input { background: rgba(0,0,0,0.2); border: none; padding: 10px; color: white; flex: 1; outline: none; }
        
        .right-bar { width: 240px; padding: 20px; }

        .sos-btn { background: #e74c3c; border: none; color: white; padding: 10px; cursor: pointer; margin-top: 10px; }
        
        /* Sesli Arama ve Diğer Butonlar */
        button { cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h1 style="color: var(--skype-blue);">AceTalk</h1>
        
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLanguage('tr')">TR</button>
            <button class="lang-btn" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" onclick="setLanguage('az')">AZ</button>
            <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
        </div>

        <input type="text" id="my-name-input" style="background: rgba(0,0,0,0.2); border: none; padding: 8px; color:white;" placeholder="İsim">
        
        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="startCall()" style="background: var(--skype-blue); border:none; color:white; padding:10px;">📞 SESLİ ARA</button>
            <button class="sos-btn" onclick="sendSOS()">🚨 ACİL</button>
        </div>
    </div>

    <div class="main-chat">
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Mesajını yaz...">
            <button onclick="sendMessage()" style="background:var(--skype-blue); border:none; color:white; padding:10px;">GÖNDER</button>
        </div>
    </div>

    <div class="right-bar">
        <h3>Çevrimiçi</h3>
        <div id="online-list"></div>
    </div>
</div>

<script>
    // 4 Dil Sözlüğü
    const i18n = {
        tr: { calling: "Aranıyor...", send: "Gönder" },
        en: { calling: "Calling...", send: "Send" },
        az: { calling: "Zəng edilir...", send: "Göndər" },
        ru: { calling: "Звонок...", send: "Отправить" }
    };

    function setLanguage(lang) {
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        console.log("Dil değiştirildi: " + lang);
    }

    // Sesli Arama Fonksiyonu (Düzeltildi)
    function startCall() {
        alert("Sesli arama başlatılıyor...");
        // Burada kendi PeerJS arama kodlarını kullanmaya devam edebilirsin
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        if(input.value) {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div style="background:rgba(255,255,255,0.1); margin:10px; padding:10px;">${input.value}</div>`;
            input.value = "";
        }
    }

    function sendSOS() { alert("ACİL DURUM SİNYALİ GÖNDERİLDİ!"); }
</script>

</body>
</html>
